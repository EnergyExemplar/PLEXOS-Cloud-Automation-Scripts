trigger:
  branches:
    include:
    - master

pr:
  branches:
    include:
    - master

variables:
  vmImageName: 'ubuntu-latest'

stages:

- stage: Set_BuildNumber
  displayName: Set Build Number
  jobs:
  - job: SetBuildNumber
    displayName: Set Build Number
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      fetchDepth: 0
    - task: PowerShell@2
      displayName: 'Set Version'
      inputs:
        targetType: 'inline'
        script: |
          $versions = Get-Content version.json | ConvertFrom-Json
          $major = $versions.major
          $minor = $versions.minor
          $commitCount = git rev-list --count origin/master
          $version = "$major.$minor.$commitCount"
          Write-Host "##vso[build.updatebuildnumber]$version"

# ── Runs on PR to master OR PR to release ──
- stage: Run_Unit_Tests
  displayName: Run Unit Tests
  dependsOn: Set_BuildNumber
  jobs:
  - job: UnitTests
    displayName: Run Unit Tests
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UsePythonVersion@0
      displayName: 'Use Python 3.x'
      inputs:
        versionSpec: '3.x'
        addToPath: true

    - task: PipAuthenticate@1
      inputs:
        artifactFeeds: 'python'
        onlyAddExtraIndex: true

    - script: |
        python -m pip install --upgrade pip
        pip install pytest pytest-azurepipelines
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      displayName: 'Install dependencies'

    - script: |
        pytest tests/ --junitxml=$(Build.ArtifactStagingDirectory)/test-results.xml -v
      displayName: 'Run pytest'

    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Build.ArtifactStagingDirectory)/test-results.xml'
        failTaskOnFailedTests: true
