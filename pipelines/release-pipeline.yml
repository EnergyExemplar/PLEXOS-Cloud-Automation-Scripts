
trigger:
  branches:
    include:
    - release

schedules:
- cron: '30 3 * * *'
  displayName: 'Daily Reverse Sync at 09:00 IST (03:30 UTC)'
  branches:
    include:
    - release
  always: true  # run even if no new internal commits

variables:
  vmImageName: 'ubuntu-latest'

stages:

- stage: Set_BuildNumber
  displayName: Set Build Number
  jobs:
  - job: SetBuildNumber
    displayName: Set Build Number
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: PowerShell@2
      displayName: 'Set Version'
      inputs:
        targetType: 'inline'
        script: |
          $versions = Get-Content version.json | ConvertFrom-Json
          $major = $versions.major
          $minor = $versions.minor
          $commitCount = git rev-list --count origin/release
          $version = "$major.$minor.$commitCount"
          Write-Host "##vso[build.updatebuildnumber]$version"

# ── Runs on every checkin (push) to release; skipped for scheduled and other non-CI triggers ──
- stage: Push_To_Public_GitHub
  displayName: Push to Public GitHub
  condition: |
    and(
      succeeded(),
      eq(variables['Build.Reason'], 'IndividualCI')
    )
  dependsOn: Set_BuildNumber
  jobs:
  - job: PushToPublicGitHub
    displayName: Push to Public GitHub Repo
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      persistCredentials: true
      fetchDepth: 0

   # 1. Generate token (do this RIGHT BEFORE git operations)
    - pwsh: |
        if ($PSVersionTable.PSVersion.Major -lt 7) {
          throw "PowerShell 7+ is required to import PEM private key. Current version: $($PSVersionTable.PSVersion)"
        }

        function ConvertTo-Base64Url([byte[]]$bytes) {
          $b64 = [Convert]::ToBase64String($bytes)
          $b64 = $b64.TrimEnd('=')
          $b64 = $b64.Replace('+', '-').Replace('/', '_')
          return $b64
        }

        # GitHub App for PUBLIC repo (EnergyExemplar/PLEXOS-Cloud-Automation-Scripts)
        $privateKeyPem = ($env:GITHUB_PUBLIC_APP_PRIVATE_KEY ?? '').Trim()
        
        if ([string]::IsNullOrWhiteSpace($privateKeyPem)) {
          throw 'GITHUB_PUBLIC_APP_PRIVATE_KEY is empty.'
        }
        
        # Handle multiple possible formats:
        # 1. Literal \n strings -> convert to actual newlines
        if ($privateKeyPem -match '\\n') {
          Write-Host "Detected escaped newlines, converting..." -ForegroundColor DarkGray
          $privateKeyPem = $privateKeyPem -replace '\\n', "`n"
        }
        # 2. If all on one line, reconstruct proper PEM format
        elseif (-not ($privateKeyPem -match "`n")) {
          Write-Host "Detected single-line key, reconstructing PEM format..." -ForegroundColor DarkGray
          # Extract header, body, and footer
          if ($privateKeyPem -match '^(-----BEGIN [^-]+ PRIVATE KEY-----)(.+?)(-----END [^-]+ PRIVATE KEY-----)$') {
            $header = $matches[1]
            $body = $matches[2]
            $footer = $matches[3]
            
            # Split body into 64-char lines
            $lines = @()
            for ($i = 0; $i -lt $body.Length; $i += 64) {
              $length = [Math]::Min(64, $body.Length - $i)
              $lines += $body.Substring($i, $length)
            }
            
            $privateKeyPem = "$header`n$($lines -join "`n")`n$footer"
          } else {
            Write-Host "##[warning]Cannot parse PEM format from single line"
          }
        }
        
        # Debug: Check if key starts with proper header
        if (-not $privateKeyPem.StartsWith('-----BEGIN')) {
          Write-Host "##[warning]Private key doesn't start with PEM header. First 50 chars: $($privateKeyPem.Substring(0, [Math]::Min(50, $privateKeyPem.Length)))"
        } else {
          Write-Host "PEM key format validated" -ForegroundColor Green
        }

        $appId = ($env:GITHUB_PUBLIC_APP_ID ?? '').Trim()
        if ([string]::IsNullOrWhiteSpace($appId)) {
          throw 'GITHUB_PUBLIC_APP_ID is empty.'
        }

        $installationId = ($env:GITHUB_PUBLIC_APP_INSTALLATION_ID ?? '').Trim()
        if ([string]::IsNullOrWhiteSpace($installationId)) {
          throw 'GITHUB_PUBLIC_APP_INSTALLATION_ID is empty.'
        }

        $now = [DateTimeOffset]::UtcNow
        $iat = [int]$now.ToUnixTimeSeconds()
        $exp = [int]$now.AddMinutes(10).ToUnixTimeSeconds()

        $headerJson = '{"alg":"RS256","typ":"JWT"}'
        $payloadJson = "{`"iat`":$iat,`"exp`":$exp,`"iss`":`"$appId`"}"

        $header = ConvertTo-Base64Url ([Text.Encoding]::UTF8.GetBytes($headerJson))
        $payload = ConvertTo-Base64Url ([Text.Encoding]::UTF8.GetBytes($payloadJson))
        $unsignedToken = "$header.$payload"

        $rsa = [System.Security.Cryptography.RSA]::Create()
        
        try {
          $rsa.ImportFromPem($privateKeyPem)
        } catch {
          Write-Host "##[error]Failed to import PEM key. Error: $_"
          Write-Host "##[debug]Key length: $($privateKeyPem.Length)"
          Write-Host "##[debug]Key preview: $($privateKeyPem.Substring(0, [Math]::Min(100, $privateKeyPem.Length)))"
          throw
        }
        $signatureBytes = $rsa.SignData(
          [Text.Encoding]::UTF8.GetBytes($unsignedToken),
          [System.Security.Cryptography.HashAlgorithmName]::SHA256,
          [System.Security.Cryptography.RSASignaturePadding]::Pkcs1
        )
        $signature = ConvertTo-Base64Url $signatureBytes
        $jwtToken = "$unsignedToken.$signature"

        $headers = @{
          Authorization = "Bearer $jwtToken"
          Accept        = 'application/vnd.github+json'
        }
        $uri = "https://api.github.com/app/installations/$installationId/access_tokens"

        $response = Invoke-RestMethod -Method Post -Uri $uri -Headers $headers
        if (-not $response -or [string]::IsNullOrWhiteSpace($response.token)) {
          throw 'GitHub installation token response did not include token.'
        }

        Write-Host "##vso[task.setvariable variable=GITHUB_TOKEN;issecret=true]$($response.token)"
        Write-Host 'Token generated successfully'
      displayName: 'Generate GitHub App Token (Public Repo)'
      env:
        GITHUB_PUBLIC_APP_PRIVATE_KEY: $(GITHUB_PUBLIC_APP_PRIVATE_KEY)
        GITHUB_PUBLIC_APP_ID: $(GITHUB_PUBLIC_APP_ID)
        GITHUB_PUBLIC_APP_INSTALLATION_ID: $(GITHUB_PUBLIC_APP_INSTALLATION_ID)

    # 2. Clear any cached credentials
    - pwsh: |
        git config --global --unset credential.helper 2>$null
        git credential-cache exit 2>$null
      displayName: 'Clear Git Credentials'

    # 3. Configure git with token
    - pwsh: |
        git config --global user.name "azure-bot[bot]"
        git config --global user.email "azure-bot[bot]@users.noreply.github.com"
        git config --global url."https://x-access-token:$env:GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
      displayName: 'Configure Git'
      env:
        GITHUB_TOKEN: $(GITHUB_TOKEN)

    # 4. Now your git operations
    - pwsh: |
        git remote -v
        git fetch origin
        git status
      displayName: 'Git Operations'
      env:
        GITHUB_TOKEN: $(GITHUB_TOKEN)

    - task: PowerShell@2
      displayName: 'Push to Public GitHub master'
      env:
        GITHUB_TOKEN: $(GITHUB_TOKEN)
      inputs:
        targetType: 'inline'
        script: |
          $repoUrl = "https://x-access-token:$($env:GITHUB_TOKEN)@github.com/EnergyExemplar/PLEXOS-Cloud-Automation-Scripts"          
          git remote add public $repoUrl

          # Ensure we are on the LATEST origin/release (reverse sync may have added commits after this pipeline was triggered)
          git fetch origin release
          git reset --hard origin/release
          Write-Host "[OK] Reset to latest origin/release: $(git rev-parse HEAD)"

          # Safety: do NOT overwrite public branch history.
          # Only push if public/<branch> is an ancestor of our current HEAD (fast-forward update).
          git fetch public master
          if ($LASTEXITCODE -ne 0) {
            Write-Host "##vso[task.logissue type=error]Failed to fetch from public GitHub. Check GITHUB_REPO_URL."
            exit 1
          }
          # Use FETCH_HEAD — set by git after every fetch, no remote-tracking ref needed
          git merge-base --is-ancestor FETCH_HEAD HEAD
          if ($LASTEXITCODE -ne 0) {
            Write-Host "##vso[task.logissue type=error]Refusing to push: public/master has commits not present in internal HEAD. Run reverse sync first."
            exit 1
          }

          # Check if there are actually any changes to publish
          git diff --quiet FETCH_HEAD HEAD
          if ($LASTEXITCODE -eq 0) {
            Write-Host "ℹ️  No changes between internal release and public/master — nothing to push."
            exit 0
          }

          # Build a single squash commit directly on top of public/master (no temp branch needed).
          # git commit-tree takes the full tree of internal HEAD and parents it to FETCH_HEAD,
          # producing one commit that contains all changes as a single delta.
          $version = $env:BUILD_BUILDNUMBER
          $tree = git rev-parse "HEAD^{tree}"
          $squashCommit = git commit-tree $tree -p FETCH_HEAD -m "Published scripts / Enhancements for public repo"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "##vso[task.logissue type=error]Failed to create squash commit."
            exit 1
          }

          git push public "${squashCommit}:refs/heads/master"
          Write-Host "✅ Successfully squash-merged and pushed to public GitHub master (commit $squashCommit)"

# ── Runs on scheduled trigger or manual trigger ──
- stage: Reverse_Sync_From_Public
  displayName: Reverse Sync from Public GitHub
  condition: |
    and(
      succeeded(),
      in(variables['Build.Reason'], 'Schedule', 'Manual')
    )
  dependsOn: Set_BuildNumber
  jobs:
  - job: ReverseSyncFromPublic
    displayName: Reverse Sync Commits from Public GitHub
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      persistCredentials: false
      fetchDepth: 0

    - pwsh: |
        if ($PSVersionTable.PSVersion.Major -lt 7) {
          throw "PowerShell 7+ is required to import PEM private key. Current version: $($PSVersionTable.PSVersion)"
        }

        function ConvertTo-Base64Url([byte[]]$bytes) {
          $b64 = [Convert]::ToBase64String($bytes)
          $b64 = $b64.TrimEnd('=')
          $b64 = $b64.Replace('+', '-').Replace('/', '_')
          return $b64
        }

        # GitHub App for INTERNAL repo (energyexemplar-cloudplatform/PLEXOS-Cloud-Automation-Scripts-internal)
        $privateKeyPem = ($env:GITHUB_INTERNAL_APP_PRIVATE_KEY ?? '').Trim()
        if ([string]::IsNullOrWhiteSpace($privateKeyPem)) { throw 'GITHUB_INTERNAL_APP_PRIVATE_KEY is empty.' }

        Write-Host "[DEBUG] Raw key length: $($privateKeyPem.Length)"
        Write-Host "[DEBUG] Inspecting private key content for newline normalization (no key material logged)"
        Write-Host "[DEBUG] Contains literal \n: $($privateKeyPem -match '\\n')"
        Write-Host "[DEBUG] Contains actual newline: $($privateKeyPem -match "`n")"

        # Step 1: Replace literal \n escape sequences with real newlines
        if ($privateKeyPem -match '\\n') {
          Write-Host "[DEBUG] Replacing literal \\n with real newlines"
          $privateKeyPem = $privateKeyPem -replace '\\n', "`n"
        }

        # Step 2: If still no newlines, strip spaces and reconstruct proper PEM
        if (-not ($privateKeyPem -match "`n")) {
          Write-Host "[DEBUG] No newlines found — reconstructing PEM from single-line string"
          # Remove all whitespace between header and footer, then reformat
          if ($privateKeyPem -match '(-----BEGIN [^-]+ PRIVATE KEY-----)(.+?)(-----END [^-]+ PRIVATE KEY-----)') {
            $header = $matches[1].Trim()
            $body   = ($matches[2] -replace '\s', '')   # strip ALL whitespace from body
            $footer = $matches[3].Trim()
            Write-Host "[DEBUG] Extracted PEM header/footer and normalized body spacing (no key material logged)"
            Write-Host "[DEBUG] Body length (stripped): $($body.Length)"
            $lines = @()
            for ($i = 0; $i -lt $body.Length; $i += 64) { $lines += $body.Substring($i, [Math]::Min(64, $body.Length - $i)) }
            $privateKeyPem = "$header`n$($lines -join "`n")`n$footer"
          } else {
            Write-Host "##[warning]Could not parse PEM structure — key may be malformed"
          }
        }

        $appId = ($env:GITHUB_INTERNAL_APP_ID ?? '').Trim()
        if ([string]::IsNullOrWhiteSpace($appId)) { throw 'GITHUB_INTERNAL_APP_ID is empty.' }

        $installationId = ($env:GITHUB_INTERNAL_APP_INSTALLATION_ID ?? '').Trim()
        if ([string]::IsNullOrWhiteSpace($installationId)) { throw 'GITHUB_INTERNAL_APP_INSTALLATION_ID is empty.' }

        $now = [DateTimeOffset]::UtcNow
        $iat = [int]$now.ToUnixTimeSeconds()
        $exp = [int]$now.AddMinutes(10).ToUnixTimeSeconds()

        $headerJson  = '{"alg":"RS256","typ":"JWT"}'
        $payloadJson = "{`"iat`":$iat,`"exp`":$exp,`"iss`":`"$appId`"}"

        $h = ConvertTo-Base64Url ([Text.Encoding]::UTF8.GetBytes($headerJson))
        $p = ConvertTo-Base64Url ([Text.Encoding]::UTF8.GetBytes($payloadJson))
        $unsigned = "$h.$p"

        $rsa = [System.Security.Cryptography.RSA]::Create()
        $rsa.ImportFromPem($privateKeyPem)
        $sig = ConvertTo-Base64Url ($rsa.SignData(
          [Text.Encoding]::UTF8.GetBytes($unsigned),
          [System.Security.Cryptography.HashAlgorithmName]::SHA256,
          [System.Security.Cryptography.RSASignaturePadding]::Pkcs1
        ))
        $jwt = "$unsigned.$sig"

        $response = Invoke-RestMethod -Method Post `
          -Uri "https://api.github.com/app/installations/$installationId/access_tokens" `
          -Headers @{ Authorization = "Bearer $jwt"; Accept = 'application/vnd.github+json' }

        if (-not $response -or [string]::IsNullOrWhiteSpace($response.token)) {
          throw 'GitHub installation token response did not include token.'
        }

        Write-Host "##vso[task.setvariable variable=GITHUB_TOKEN;issecret=true]$($response.token)"
        Write-Host 'Token generated successfully'
      displayName: 'Generate GitHub App Token (Internal Repo)'
      env:
        GITHUB_INTERNAL_APP_PRIVATE_KEY: $(GITHUB_INTERNAL_APP_PRIVATE_KEY)
        GITHUB_INTERNAL_APP_ID: $(GITHUB_INTERNAL_APP_ID)
        GITHUB_INTERNAL_APP_INSTALLATION_ID: $(GITHUB_INTERNAL_APP_INSTALLATION_ID)

    - pwsh: |
        git config --global user.email "ee-ravens-bot[bot]@users.noreply.github.com"
        git config --global user.name "ee-ravens-bot[bot]"
        # Scope extraheader to internal org only — public repo uses GITHUB_PATT embedded in its remote URL
        # persistCredentials: false ensures azure-pipelines[bot] token is NOT stored locally
        $basicAuth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:GITHUB_TOKEN"))
        git config --global http."https://github.com/energyexemplar-cloudplatform/".extraheader "Authorization: Basic $basicAuth"
        Write-Host "[OK] Git configured with ee-ravens-bot App token (scoped to internal org)"
      displayName: 'Configure Git'
      env:
        GITHUB_TOKEN: $(GITHUB_TOKEN)

    - task: PowerShell@2
      displayName: 'Fetch and Sync from Public GitHub'
      env:
        GITHUB_TOKEN: $(GITHUB_TOKEN)
        GITHUB_PATT: $(GITHUB_PATT)
      inputs:
        targetType: 'inline'
        script: |
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            Write-Host "##vso[task.logissue type=error]GITHUB_TOKEN is empty — ee-ravens-bot App token was not generated. Check Generate GitHub App Token step."
            exit 1
          }
          Write-Host "[OK] ee-ravens-bot App token is present"

          $repoUrl = "https://x-access-token:$($env:GITHUB_PATT)@github.com/EnergyExemplar/PLEXOS-Cloud-Automation-Scripts"
          git remote add public $repoUrl
          git fetch public master
          if ($LASTEXITCODE -ne 0) {
            Write-Host "##vso[task.logissue type=error]Failed to fetch from public GitHub. Check GITHUB_PATT."
            exit 1
          }
          git fetch origin master
          git fetch origin release

          # ── Sync public/master → internal master (create PR) ──
          $publicMasterTree   = git rev-parse "public/master^{tree}"
          $internalMasterTree = git rev-parse "origin/master^{tree}"
          if ($publicMasterTree -ne $internalMasterTree) {
            Write-Host "Content differs between public/master and internal master — creating PR"

            # Push public/master content onto a dated sync branch in the internal repo
            $dateSuffix = (Get-Date -Format 'yyyyMMdd-HHmmss')
            $syncBranch = "sync/public-master-$dateSuffix"

            # Create a commit: full tree of public/master parented onto origin/master
            $syncCommit = git commit-tree $publicMasterTree -p origin/master -m "Reverse sync: public/master to internal master"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "##vso[task.logissue type=error]Failed to create sync commit for master PR."
              exit 1
            }

            git push origin "${syncCommit}:refs/heads/$syncBranch"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "##vso[task.logissue type=error]Failed to push sync branch to internal repo."
              exit 1
            }
            Write-Host "[OK] Pushed sync branch: $syncBranch"

            # Create PR via GitHub API
            $prBody = @{
              title = "Reverse sync: public/master to internal master ($dateSuffix)"
              head  = $syncBranch
              base  = "master"
              body  = "Automated reverse sync from EnergyExemplar/PLEXOS-Cloud-Automation-Scripts public master."
            } | ConvertTo-Json

            $prResponse = Invoke-RestMethod -Method Post `
              -Uri "https://api.github.com/repos/energyexemplar-cloudplatform/PLEXOS-Cloud-Automation-Scripts-internal/pulls" `
              -Headers @{ Authorization = "token $env:GITHUB_TOKEN"; Accept = 'application/vnd.github+json' } `
              -Body $prBody `
              -ContentType 'application/json'

            if ($prResponse -and $prResponse.html_url) {
              Write-Host "✅ PR created: $($prResponse.html_url)"
            } else {
              Write-Host "##vso[task.logissue type=error]PR creation failed or returned no URL."
              exit 1
            }
          } else {
            Write-Host "ℹ️  No new commits to sync — internal master is already up to date with public/master"
          }

          # ── Sync public/master → internal release (squash, independent of master) ──
          $publicMasterTree   = git rev-parse "public/master^{tree}"
          $internalReleaseTree = git rev-parse "origin/release^{tree}"
          if ($publicMasterTree -ne $internalReleaseTree) {
            Write-Host "Content differs between public/master and internal release — squash-syncing"

            # Build a squash commit: full tree of public/master parented onto origin/release
            $squashCommit = git commit-tree $publicMasterTree -p origin/release -m "merged from public repo"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "##vso[task.logissue type=error]Failed to create squash commit for release."
              exit 1
            }

            git push origin "${squashCommit}:refs/heads/release"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "##vso[task.logissue type=error]Failed to push squash commit to internal release."
              exit 1
            }
            Write-Host "✅ Squash-synced public/master into internal release (commit $squashCommit)"
          } else {
            Write-Host "ℹ️  No new commits to sync — internal release is already up to date with public/master"
          }
