# ─────────────────────────────────────────────────────────────
# Pipeline: release.pipeline.yml
# Triggers: CI after PR is MERGED into release (direct push blocked via branch policy)
#           PR validation into release (runs unit tests)
# Stages  : Set Build Number → Run Unit Tests (PR only)
#                            → Push to Public GitHub (merge only)
# ─────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
    - release

pr:
  branches:
    include:
    - release  # ← PR into release required; direct push blocked via branch policy

variables:
  vmImageName: 'ubuntu-latest'

stages:

- stage: Set_BuildNumber
  displayName: Set Build Number
  jobs:
  - job: SetBuildNumber
    displayName: Set Build Number
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: PowerShell@2
      displayName: 'Set Version'
      inputs:
        targetType: 'inline'
        script: |
          $versions = Get-Content version.json | ConvertFrom-Json
          $major = $versions.major
          $minor = $versions.minor
          $commitCount = git rev-list --count origin/ab_addcicd
          $version = "$major.$minor.$commitCount"
          Write-Host "##vso[build.updatebuildnumber]$version"

# ── Runs only after PR is MERGED into release (not during PR validation) ──
- stage: Push_To_Public_GitHub
  displayName: Push to Public GitHub
  condition: |
    and(
      succeeded(),
      ne(variables['Build.Reason'], 'PullRequest')
    )
  dependsOn: Set_BuildNumber
  jobs:
  - job: PushToPublicGitHub
    displayName: Push to Public GitHub Repo
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - task: PowerShell@2
      displayName: 'Configure Git'
      inputs:
        targetType: 'inline'
        script: |
          git config --global user.email "pipeline@energyexemplar.com"
          git config --global user.name "Azure DevOps Pipeline"

    - task: PowerShell@2
      displayName: 'Push to Public GitHub master'
      env:
        GITHUB_PAT: $(GITHUB_PAT)
        GITHUB_REPO_URL: $(GITHUB_REPO_URL)
        publicRepoBranch: $(publicRepoBranch)
      inputs:
        targetType: 'inline'
        script: |
          $repoUrl = $env:GITHUB_REPO_URL -replace "https://", "https://$($env:GITHUB_PAT)@"
          git remote add public $repoUrl
          git push public HEAD:refs/heads/$(publicRepoBranch) --force
          Write-Host "✅ Successfully pushed to public GitHub $(publicRepoBranch)"

# ── Reverse sync: pull commits from public GitHub back to cloud platform ──
- stage: Reverse_Sync_From_Public
  displayName: Reverse Sync from Public GitHub
  # condition: |
  #   and(
  #     succeeded(),
  #     ne(variables['Build.Reason'], 'PullRequest')
  #   )
  dependsOn: Push_To_Public_GitHub
  jobs:
  - job: ReverseSyncFromPublic
    displayName: Reverse Sync Commits from Public GitHub
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - task: PowerShell@2
      displayName: 'Configure Git'
      inputs:
        targetType: 'inline'
        script: |
          git config --global user.email "pipeline@energyexemplar.com"
          git config --global user.name "Azure DevOps"

    - task: PowerShell@2
      displayName: 'Fetch and Sync from Public GitHub'
      env:
        GITHUB_PAT: $(GITHUB_PAT)
        GITHUB_REPO_URL: $(GITHUB_REPO_URL)
        publicRepoBranch: $(publicRepoBranch)
      inputs:
        targetType: 'inline'
        script: |
          $repoUrl = $env:GITHUB_REPO_URL -replace "https://", "https://$($env:GITHUB_PAT)@"
          git remote add public $repoUrl
          git fetch public $(publicRepoBranch)

          # Ensure we sync into internal master branch
          git fetch origin master
          git checkout -B master origin/master
          git pull origin master
          
          # Check if there are new commits in public that aren't in origin
          $localCommits = git rev-list origin/master..public/$(publicRepoBranch) | Measure-Object -Line
          
          if ($localCommits.Lines -gt 0) {
            Write-Host "Found $($localCommits.Lines) new commits in public GitHub"
            git merge public/$(publicRepoBranch) --no-edit
            git push origin HEAD:refs/heads/master
            Write-Host "✅ Successfully synced commits back to cloud platform"
          } else {
            Write-Host "ℹ️  No new commits in public GitHub to sync"
          }



