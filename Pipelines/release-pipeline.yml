# ─────────────────────────────────────────────────────────────
# Pipeline: release.pipeline.yml
# Triggers: CI after PR is MERGED into release (direct push blocked via branch policy)
#           PR validation into release (runs unit tests)
#           New commit pushed to public GitHub repo (triggers Reverse Sync only)
# Stages  : Set Build Number → Push to Public GitHub (internal release push only)
#                            → Reverse Sync from Public GitHub (on public repo commit OR after push)
# ─────────────────────────────────────────────────────────────

# ── Trigger on new commits pushed directly to the public GitHub repo ──
resources:
  repositories:
  - repository: publicGitHub
    type: github
    endpoint: GitHubServiceConnection  # ← name of your GitHub service connection in Azure DevOps
    name: energyexemplar-core/EE.Automation-scripts-test
    trigger:
      branches:
        include:
        - main

trigger:
  branches:
    include:
    - release

pr:
  branches:
    include:
    - release  # ← PR into release required; direct push blocked via branch policy

variables:
  vmImageName: 'ubuntu-latest'
  publicRepoBranch: 'main'

stages:

- stage: Set_BuildNumber
  displayName: Set Build Number
  jobs:
  - job: SetBuildNumber
    displayName: Set Build Number
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: PowerShell@2
      displayName: 'Set Version'
      inputs:
        targetType: 'inline'
        script: |
          $versions = Get-Content version.json | ConvertFrom-Json
          $major = $versions.major
          $minor = $versions.minor
          $commitCount = git rev-list --count origin/release
          $version = "$major.$minor.$commitCount"
          Write-Host "##vso[build.updatebuildnumber]$version"

# ── Runs only after PR is MERGED into release; skipped when triggered by public repo commit ──
- stage: Push_To_Public_GitHub
  displayName: Push to Public GitHub
  condition: |
    and(
      succeeded(),
      ne(variables['Build.Reason'], 'PullRequest'),
      ne(variables['Build.Reason'], 'ResourceTrigger')
    )
  dependsOn: Set_BuildNumber
  jobs:
  - job: PushToPublicGitHub
    displayName: Push to Public GitHub Repo
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - task: PowerShell@2
      displayName: 'Configure Git'
      inputs:
        targetType: 'inline'
        script: |
          git config --global user.email "pipeline@energyexemplar.com"
          git config --global user.name "Azure DevOps Pipeline"

    - task: PowerShell@2
      displayName: 'Push to Public GitHub master'
      env:
        GITHUB_PAT: $(GITHUB_PAT)
        GITHUB_REPO_URL: $(GITHUB_REPO_URL)
        publicRepoBranch: $(publicRepoBranch)
      inputs:
        targetType: 'inline'
        script: |
          $repoUrl = $env:GITHUB_REPO_URL -replace "https://", "https://$($env:GITHUB_PAT)@"
          git remote add public $repoUrl

          # Safety: do NOT overwrite public branch history.
          # Only push if public/<branch> is an ancestor of our current HEAD (fast-forward update).
          git fetch public $(publicRepoBranch)
          git merge-base --is-ancestor public/$(publicRepoBranch) HEAD
          if ($LASTEXITCODE -ne 0) {
            Write-Host "##vso[task.logissue type=error]Refusing to push: public/$(publicRepoBranch) has commits not present in internal HEAD. Run reverse sync first."
            exit 1
          }

          git push public HEAD:refs/heads/$(publicRepoBranch)
          Write-Host "✅ Successfully pushed to public GitHub $(publicRepoBranch)"

# ── Runs when public repo has a new commit (ResourceTrigger) OR after a successful push stage ──
- stage: Reverse_Sync_From_Public
  displayName: Reverse Sync from Public GitHub
  condition: |
    or(
      eq(variables['Build.Reason'], 'ResourceTrigger'),
      eq(dependencies.Push_To_Public_GitHub.result, 'Succeeded')
    )
  dependsOn: Push_To_Public_GitHub
  jobs:
  - job: ReverseSyncFromPublic
    displayName: Reverse Sync Commits from Public GitHub
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - task: PowerShell@2
      displayName: 'Configure Git'
      inputs:
        targetType: 'inline'
        script: |
          git config --global user.email "pipeline@energyexemplar.com"
          git config --global user.name "Azure DevOps"

    - task: PowerShell@2
      displayName: 'Fetch and Sync from Public GitHub'
      env:
        GITHUB_PAT: $(GITHUB_PAT)
        GITHUB_REPO_URL: $(GITHUB_REPO_URL)
        publicRepoBranch: $(publicRepoBranch)
      inputs:
        targetType: 'inline'
        script: |
          $repoUrl = $env:GITHUB_REPO_URL -replace "https://", "https://$($env:GITHUB_PAT)@"
          git remote add public $repoUrl
          git fetch public $(publicRepoBranch)
          git fetch origin master release

          # Check if there are new commits in public that aren't in internal master
          $newCommits = git rev-list origin/master..public/$(publicRepoBranch) | Measure-Object -Line

          if ($newCommits.Lines -gt 0) {
            Write-Host "Found $($newCommits.Lines) new commits in public GitHub — syncing into master and release"

            # ── Merge into master ──
            git checkout -B master origin/master
            git merge public/$(publicRepoBranch) --no-edit
            git push origin HEAD:refs/heads/master
            Write-Host "✅ Synced into master"

            # ── Merge into release ──
            git checkout -B release origin/release
            git merge public/$(publicRepoBranch) --no-edit
            git push origin HEAD:refs/heads/release
            Write-Host "✅ Synced into release"
          } else {
            Write-Host "ℹ️  No new commits in public GitHub to sync"
          }



