trigger:
  branches:
    include:
    - master
    - release

pr:
  branches:
    include:
    - master
    - release  # ← PR into release is required (direct push blocked via branch policy)

variables:
  vmImageName: 'ubuntu-latest'

stages:

- stage: Set_BuildNumber
  displayName: Set Build Number
  jobs:
  - job: SetBuildNumber
    displayName: Set Build Number
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: PowerShell@2
      displayName: 'Set Version'
      inputs:
        targetType: 'inline'
        script: |
          $versions = Get-Content version.json | ConvertFrom-Json
          $major = $versions.major
          $minor = $versions.minor
          $commitCount = git rev-list --count origin/ab_addcicd
          $version = "$major.$minor.$commitCount"
          Write-Host "##vso[build.updatebuildnumber]$version"

# ── Runs on PR to master OR PR to release ──
- stage: Run_Unit_Tests
  displayName: Run Unit Tests
  # condition: eq(variables['Build.Reason'], 'PullRequest')
  dependsOn: Set_BuildNumber
  jobs:
  - job: UnitTests
    displayName: Run Unit Tests
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UsePythonVersion@0
      displayName: 'Use Python 3.x'
      inputs:
        versionSpec: '3.x'
        addToPath: true

    - task: PipAuthenticate@1
      displayName: 'Authenticate to Azure Artifacts'
      inputs:
        artifactFeeds: 'Cloud Platform/python'

    - script: |
        python -m pip install --upgrade pip
        pip install pytest pytest-azurepipelines pandas numpy pyarrow matplotlib seaborn openpyxl eecloud
      displayName: 'Install dependencies'

    - script: |
        cd $(Build.SourcesDirectory)/tests
        pytest --junitxml=$(Build.ArtifactStagingDirectory)/test-results.xml -v
      displayName: 'Run pytest'

    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Build.ArtifactStagingDirectory)/test-results.xml'
        testRunTitle: 'PLEXOS Unit Tests'
        failTaskOnFailedTests: true

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Test Artifacts'
      condition: always()
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'test-results'

# ── Only triggers after PR is MERGED into release (not on PR itself) ──
- stage: Push_To_Public_GitHub
  displayName: Push to Public GitHub
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/release'),
      ne(variables['Build.Reason'], 'PullRequest')
    )
  dependsOn: Set_BuildNumber
  jobs:
  - deployment: PushToPublicGitHub
    displayName: Push to Public GitHub Repo
    pool:
      vmImage: $(vmImageName)
    # ── Approvers configured here: Pipelines → Environments → production-github-push → Approvals & Checks ──
    environment: 'production-github-push'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            persistCredentials: true
            fetchDepth: 0

          - task: PowerShell@2
            displayName: 'Configure Git'
            inputs:
              targetType: 'inline'
              script: |
                git config --global user.email "pipeline@energyexemplar.com"
                git config --global user.name "Azure DevOps Pipeline"

          - task: PowerShell@2
            displayName: 'Push to Public GitHub master'
            env:
              GITHUB_PAT: $(GITHUB_PAT)
              GITHUB_REPO_URL: $(GITHUB_REPO_URL)
            inputs:
              targetType: 'inline'
              script: |
                $repoUrl = $env:GITHUB_REPO_URL -replace "https://", "https://$($env:GITHUB_PAT)@"
                git remote add public $repoUrl
                git push public HEAD:refs/heads/master --force
                Write-Host "✅ Successfully pushed to public GitHub master"